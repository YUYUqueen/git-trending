name: Daily Trending

on:
  schedule:
    - cron: '0 0 * * *'  # UTC 0:00 = Beijing 8:00
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create data directory
        run: mkdir -p data

      - name: Download database from latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download latest --pattern "trending.db" --dir data/ || echo "No existing database found, starting fresh"

      - name: Run crawler
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: python main.py crawl

      - name: Upload database as artifact
        uses: actions/upload-artifact@v4
        with:
          name: trending-db
          path: data/trending.db

  analyze:
    needs: crawl
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create data directory
        run: mkdir -p data

      - name: Download database artifact
        uses: actions/download-artifact@v4
        with:
          name: trending-db
          path: data/

      - name: Generate daily report with Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are a technology trend analyst. Read the .claude/skills/daily-report.md file for full instructions, then execute all steps described in it:
            1. Read today's signals from data/trending.db
            2. Analyze and classify all projects by domain
            3. Generate a structured Chinese daily report in Telegram HTML format
            4. Store the report in the database
            5. Send it via Telegram using the notify module

            The TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID are available as environment variables.
            Python dependencies are already installed. Work from the repository root.
          claude_args: "--max-turns 30 --allowedTools 'Bash(python:*),Bash(sqlite3:*),Bash(pip:*),Read,Write,Edit'"
          show_full_output: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Upload database to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes || true
          gh release create latest data/trending.db --title "Latest Database" --notes "Auto-updated by daily pipeline"
